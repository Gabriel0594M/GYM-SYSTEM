version: "3.8"

services:
  postgres-keycloak:
    image: postgres:16-alpine
    container_name: gym-postgres-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - ./keycloak-data:/var/lib/postgresql/data
    networks:
      - gym-network

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: gym-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8280:8080"
    depends_on:
      - postgres-keycloak
    networks:
      - gym-network

  postgres-gym:
    image: postgres:16-alpine
    container_name: postgres-gym
    environment:
      POSTGRES_DB: gym_booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    networks:
      - gym-network

  gym-booking-service:
    build:
      context: ./gym-booking-service
      dockerfile: Dockerfile
    container_name: gym-booking-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-gym:5432/gym_booking_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/gym-system/protocol/openid-connect/certs
    depends_on:
      - postgres-gym
      - keycloak
    networks:
      - gym-network

  nginx:
    image: nginx:1.27-alpine
    container_name: gym-nginx-gateway
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gym-booking-service
    networks:
      - gym-network

networks:
  gym-network:
    driver: bridge

